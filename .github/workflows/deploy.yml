name: Deploy to Azure

on:
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  APP_NAME: snapsight-ai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push backend image
      run: |
        docker build \
          -t ${{ env.REGISTRY }}/snapsight-backend:${{ github.sha }} \
          -t ${{ env.REGISTRY }}/snapsight-backend:latest \
          ./backend
        docker push ${{ env.REGISTRY }}/snapsight-backend:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/snapsight-backend:latest

    - name: Build and push frontend image
      run: |
        docker build \
          -t ${{ env.REGISTRY }}/snapsight-frontend:${{ github.sha }} \
          -t ${{ env.REGISTRY }}/snapsight-frontend:latest \
          --build-arg REACT_APP_API_BASE=https://${{ env.APP_NAME }}-backend.azurewebsites.net \
          ./frontend
        docker push ${{ env.REGISTRY }}/snapsight-frontend:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/snapsight-frontend:latest

    - name: Deploy to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Update backend App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.APP_NAME }}-backend
        images: ${{ env.REGISTRY }}/snapsight-backend:latest

    - name: Update frontend App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.APP_NAME }}-frontend
        images: ${{ env.REGISTRY }}/snapsight-frontend:latest

    - name: Azure logout
      run: az logout
